<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - JDM Car Configurator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .marketplace-header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .marketplace-header h1 {
            margin: 0 0 10px 0;
            font-size: 2.5em;
        }
        .marketplace-header p {
            margin: 0;
            opacity: 0.9;
        }
        .marketplace-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }
        .marketplace-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 12px var(--shadow-primary);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: 2px solid var(--border-primary);
        }
        .marketplace-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 24px var(--shadow-primary);
            border-color: var(--accent-primary);
        }
        .marketplace-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .marketplace-card-content {
            padding: 20px;
        }
        .marketplace-card h3 {
            margin: 0 0 8px 0;
            color: var(--text-secondary);
            font-size: 1.3em;
        }
        .marketplace-card .price {
            font-size: 1.6em;
            font-weight: bold;
            color: var(--accent-primary);
            margin: 12px 0;
        }
        .marketplace-card .description {
            color: var(--text-tertiary);
            font-size: 0.95em;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .marketplace-card .mods-preview {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85em;
            color: var(--text-tertiary);
        }
        .image-count {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(100, 116, 139, 0.2);
            color: var(--accent-primary);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            margin-top: 8px;
        }
        .no-cars {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }
        .no-cars .icon {
            font-size: 4em;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 data-i18n="index.marketplace"> Marketplace</h1>
            <nav class="main-nav">
                <a href="/" class="nav-link" data-i18n="configurator.home">Home</a>
                <a href="/configurator" class="nav-link" data-i18n="configurator.configurator">Configurator</a>
                <a href="/marketplace" class="nav-link active" data-i18n="index.marketplace">Marketplace</a>
                <a href="/orders" class="nav-link" data-i18n="index.myOrders">Orders</a>
                <a href="/profile" class="nav-link" data-i18n="index.profile">Profile</a>
                <button onclick="handleLogout()" class="btn btn-secondary btn-small" data-i18n="common.logout">Logout</button>
            </nav>
        </header>

        <div class="marketplace-header">
            <h1 data-i18n="marketplace.readyMade">Ready-Made Projects</h1>
            <p data-i18n="marketplace.readyMadeDesc">Pre-modified JDM cars from our service</p>
        </div>

        <div id="marketplaceGrid" class="marketplace-grid">
            <p class="loading" data-i18n="common.loading">Loading...</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <script>
        async function handleLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                console.error('Error logging out:', error);
            }
        }

        async function loadMarketplace() {
            try {
                const response = await fetch('/api/marketplace');
                const cars = await response.json();
                renderCars(cars);
            } catch (error) {
                console.error('Error loading marketplace:', error);
                document.getElementById('marketplaceGrid').innerHTML =
                    '<p class="error">' + i18n.t('common.error') + '</p>';
            }
        }

        function renderCars(cars) {
            const grid = document.getElementById('marketplaceGrid');

            if (cars.length === 0) {
                grid.innerHTML = `
                    <div class="no-cars">
                        <div class="icon"></div>
                        <h2 data-i18n="marketplace.noCars">No Cars Available Yet</h2>
                        <p data-i18n="marketplace.stayTuned">Stay tuned for updates or order a custom project</p>
                        <a href="/configurator" class="btn btn-primary" style="margin-top: 20px;" data-i18n="marketplace.buildOwn">
                            Build Your Own Project
                        </a>
                    </div>
                `;
                return;
            }

            grid.innerHTML = cars.map(car => `
                <div class="marketplace-card" onclick="window.location.href='/marketplace/${car.id}'">
                    ${car.images && car.images.length > 0
                        ? `<img src="${car.images[0]}" alt="${car.name}">`
                        : `<div style="width:100%;height:220px;background:linear-gradient(135deg,var(--accent-primary) 0%,var(--bg-secondary) 100%);display:flex;align-items:center;justify-content:center;color:white;font-size:4em;"></div>`
                    }
                    <div class="marketplace-card-content">
                        <h3>${car.name}</h3>
                        <div class="price">${car.price || i18n.t('marketplace.byAgreement')}</div>
                        <p class="description">${car.description ? car.description.substring(0, 120) + '...' : i18n.t('marketplace.noDesc')}</p>
                        ${car.questionnaire && car.questionnaire.mods_list
                            ? `<div class="mods-preview">
                                <strong data-i18n="marketplace.modifications">Modifications:</strong> ${car.questionnaire.mods_list.substring(0, 80)}...
                               </div>`
                            : ''
                        }
                        ${car.images && car.images.length > 0
                            ? `<div class="image-count"> ${car.images.length} photo(s)</div>`
                            : ''
                        }
                    </div>
                </div>
            `).join('');
        }

        loadMarketplace();
    </script>
</body>
</html>
